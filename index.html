<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberSafe — Cybersecurity Training Platform</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>" />
</head>
<body>
  <!-- Background Canvases -->
  <canvas id="particles-canvas"></canvas>
  <canvas id="matrix-canvas"></canvas>

  <!-- Boot Screen -->
  <div id="boot-screen">
    <div class="boot-terminal" id="boot-terminal"></div>
    <div class="boot-progress"><div class="boot-progress-bar" id="boot-progress-bar"></div></div>
  </div>

  <!-- Auth Screen -->
  <div id="auth-screen">
    <div class="auth-container">
      <div class="auth-logo">
        <h1 class="glitch">CYBERSAFE</h1>
        <p>SECURITY TRAINING PLATFORM</p>
      </div>
      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchAuthTab('login')">LOGIN</button>
          <button class="auth-tab" onclick="switchAuthTab('signup')">SIGN UP</button>
        </div>
        <div id="auth-error"></div>
        <div id="auth-form"></div>
        <div class="auth-demo">
          🎮 DEMO ACCESS<br/>
          <span style="font-family:var(--font-mono);color:var(--neon-cyan);">cyberguest / cyber123</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="main-app" style="display:none;">
    <div id="nav-area"></div>
    <div id="app-content"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
